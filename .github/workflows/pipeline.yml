name: CI/CD Pipeline

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Docker requires lowercase repository names
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }} ./backend
          docker build -t ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }}
          docker push ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }}

      - name: Update Helm Chart Values
        run: |
          # Install yq to manipulate YAML safely
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod a+x /usr/local/bin/yq
          
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # Update the Helm values.yaml with the newly built image tags
          yq e -i ".image.backendTag = \"${{ github.sha }}\"" charts/supplychain/values.yaml
          yq e -i ".image.frontendTag = \"${{ github.sha }}\"" charts/supplychain/values.yaml
          yq e -i ".image.repository = \"ghcr.io/${REPO_OWNER}\"" charts/supplychain/values.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/supplychain/values.yaml
          git commit -m "chore(cd): update helm chart image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push