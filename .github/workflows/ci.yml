name: CI

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Docker requires lowercase repository names
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }} ./backend
          docker build -t ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }}
          docker push ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }}