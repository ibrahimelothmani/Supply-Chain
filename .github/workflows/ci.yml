name: CI

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker images
        run: |
          # Docker requires lowercase repository names
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          docker build -t ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }} ./backend
          docker build -t ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }} ./frontend
          docker push ghcr.io/$REPO_OWNER/inventory-backend:${{ github.sha }}
          docker push ghcr.io/$REPO_OWNER/inventory-frontend:${{ github.sha }}

      - name: Update K8s manifests
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          sed -i "s|image: ghcr.io/.*/inventory-backend:.*|image: ghcr.io/${REPO_OWNER}/inventory-backend:${{ github.sha }}|g" k8s/backend/deployment.yaml
          sed -i "s|image: ghcr.io/.*/inventory-frontend:.*|image: ghcr.io/${REPO_OWNER}/inventory-frontend:${{ github.sha }}|g" k8s/frontend/deployment.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
          git commit -m "chore(cd): update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push