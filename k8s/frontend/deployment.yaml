apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: supplychain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/ibrahimelothmani/inventory-frontend:744fb512b6de21424d8f54d5f20910e1339b9146
        ports:
        - containerPort: 80
